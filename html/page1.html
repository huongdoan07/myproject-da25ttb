<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiển thị xin chào với hộp thoại alert()</title>
    <link rel="stylesheet" href="../css/page1.css"
</head>
<body>

    <div class="container">
        <p id="name" class="welcome-text">Hương Đoan</p>
    </div>

    <script>
        let name = document.getElementById("name").innerText.trim();
        window.alert("Xin chào " + name + "! Chúc bạn một ngày vui vẻ.");
    </script>
</body>
</html>
