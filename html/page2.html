<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhập dữ liệu hiển thị với prompt và alert</title>
    <link rel="stylesheet" href="../css/page2.css">
</head>
<body>

    <div class="welcome-box">
        <div class="glow-circle"></div>
        <h1>Hệ Thống Đã Xác Thực</h1>
        <p>Cảm ơn bạn đã nhập thông tin!</p>
    </div>

    <script>
        let name = prompt("Nhập vào tên của bạn:");
        let yob = prompt("Nhập vào năm sinh của bạn:");
        alert(`Xin chào ${name}, năm 2026 bạn đã ${2026 - yob} tuổi rồi đó.`);
    </script>
</body>
</html>
